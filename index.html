<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bethel Radio Brandon WSPE 96.5 FM</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000"/>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="images/icon_512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon_180x180.png">
  <link rel="stylesheet" href="styles.css?v=1">
</head>

<body>
<img class="logo" src="images/Asset 1.webp?v=1" alt="Bethel Radio Brandon" />
  
  <div class="radio-player">
    <img id="cover" src="images/fallback.webp?v=1" alt="Bethel Radio Brandon" />

    <div class="station-info">
      <span class="live-badge">● LIVE</span>
      <h1 id="songTitle">Loading...</h1>
      <p id="nowPlaying"></p>
      <p id="connectionStatus" class="connection-status"></p>
    </div>

    <div class="controls-wrapper">
      <button id="playBtn">
        <svg viewBox="0 0 24 24" width="32" height="32">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button id="volumeBtn">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </div>

    <audio id="radio" preload="none"></audio>
  </div>

  <script src="app.js?v=1"></script>
  <script src="pwa-install.js?v=1"></script>

</body>
</html>
