<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bethel Radio Brandon WSPE 96.5 FM</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000"/>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="images/icon_512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon_180x180.png">
  <style>
    html {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      padding: 30px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      touch-action: manipulation;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(to bottom, #00341a 0%, #00af5c 100%);
      background-attachment: fixed;
      background-size: 100% 100%;
      background-color: #00341a;
    }
    .logo {
      width: 168px;
      margin-bottom: 30px;
    }
    .radio-player {
      width: 100%;
      max-width: 320px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    #cover {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .live-badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .station-info h1 {
      margin: 10px 0;
      font-size: 32px;
    }
    #nowPlaying {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      min-height: 40px;
      margin-bottom: 28px;
    }
    #playBtn {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      border: none;
      background: white;
      color: #00341a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
    }
    #playBtn:hover {
      transform: scale(1.05);
    }
    #playBtn:active, #volumeBtn:active {
      transform: scale(0.95);
    }
    .controls-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
    }
    #volumeBtn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
      margin-left: 15px;
    }
    #volumeBtn:hover {
      transform: scale(1.05);
    }
    #volumeBtn svg, #playBtn svg {
      fill: currentColor;
    }
    .connection-status {
      color: #ffd700;
      font-size: 13px;
      min-height: 20px;
      margin: 0 0 8px;
      display: none;
    }
  </style>
</head>

<body>
<img class="logo" src="images/Asset 1.webp" alt="Bethel Radio Brandon" />
  
  <div class="radio-player">
    <img id="cover" src="images/fallback.webp" alt="Bethel Radio Brandon" />

    <div class="station-info">
      <span class="live-badge">● LIVE</span>
      <h1 id="songTitle">Loading...</h1>
      <p id="nowPlaying"></p>
      <p id="connectionStatus" class="connection-status"></p>
    </div>

    <div class="controls-wrapper">
      <button id="playBtn">
        <svg viewBox="0 0 24 24" width="32" height="32">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button id="volumeBtn">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </div>

    <audio id="radio" preload="none"></audio>
  </div>

  <script>
    const STREAM_URL = "https://stream.rcast.net/73642";
    const METADATA_URL = "https://status.rcast.net/73642";
    const ARTWORK_URL = "https://artwork.rcast.net/73642";
    const API_PROXY = "https://bethel-radio-redirect-resolver.vercel.app/api/resolve";

    const audio = document.getElementById("radio");
    const playBtn = document.getElementById("playBtn");
    const volumeBtn = document.getElementById("volumeBtn");
    const cover = document.getElementById("cover");
    const connectionStatus = document.getElementById("connectionStatus");

    audio.src = STREAM_URL;

    let playing = false;
    let volume = 0.8;
    let isMuted = false;
    let reconnectTimeout = null;
    let reconnectAttempts = 0;

    audio.volume = volume;

    function setStatus(msg) {
      connectionStatus.innerText = msg;
      connectionStatus.style.display = msg ? "block" : "none";
    }

    function cancelReconnect() {
      if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
      }
    }

    function attemptReconnect() {
      if (!playing) return;
      if (reconnectTimeout) return;

      const delay = Math.min(2000 * Math.pow(2, reconnectAttempts), 30000) + Math.random() * 1000;
      reconnectAttempts++;

      setStatus("Reconnecting...");
      playBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12 6v6l4 2"/></svg>';

      reconnectTimeout = setTimeout(() => {
        reconnectTimeout = null;
        audio.load();
        audio.play().then(() => {
          reconnectAttempts = 0;
          setStatus("");
        }).catch(() => {
          attemptReconnect();
        });
      }, delay);
    }

    playBtn.addEventListener("click", async () => {
      try {
        if (!playing) {
          cancelReconnect();
          reconnectAttempts = 0;
          audio.src = STREAM_URL;
          audio.load();
          await audio.play();
          playBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
          playing = true;
          setStatus("");
        } else {
          cancelReconnect();
          audio.pause();
          playBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><path d="M8 5v14l11-7z"/></svg>';
          playing = false;
          setStatus("");
        }
      } catch {
        setStatus("Tap play again");
        setTimeout(async () => {
          if (!playing) {
            try {
              audio.src = STREAM_URL;
              audio.load();
              await audio.play();
              playBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
              playing = true;
              setStatus("");
            } catch {}
          }
        }, 1000);
      }
    });

    volumeBtn.addEventListener("click", () => {
      if (isMuted) {
        audio.volume = volume;
        volumeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
        isMuted = false;
      } else {
        audio.volume = 0;
        volumeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/></svg>';
        isMuted = true;
      }
    });

    audio.addEventListener("error", () => { if (playing) attemptReconnect(); });
    audio.addEventListener("stalled", () => { if (playing) setStatus("Buffering..."); });
    audio.addEventListener("waiting", () => { if (playing) setStatus("Buffering..."); });
    audio.addEventListener("playing", () => {
      cancelReconnect();
      reconnectAttempts = 0;
      setStatus("");
      playBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    });
    audio.addEventListener("ended", () => { if (playing) attemptReconnect(); });

    async function getArtworkUrl() {
      try {
        const response = await fetch(API_PROXY + "?url=" + encodeURIComponent(ARTWORK_URL));
        const data = await response.json();
        let url = data.content || data.finalUrl;

        if (typeof url === 'string') {
          url = url.trim().replace(/[^a-zA-Z0-9:/.?&=%_-]/g, '');
        }

        if (!url || url.includes("error") || url.includes("localhost") || !url.startsWith('http')) {
          throw new Error("Invalid artwork URL");
        }

        return url;
      } catch (err) {
        console.error("Artwork fetch error:", err);
        return "images/fallback.webp";
      }
    }

    async function fetchMetadata() {
      try {
        const response = await fetch(API_PROXY + "?url=" + encodeURIComponent(METADATA_URL));
        const data = await response.json();
        const text = data.content || data.finalUrl;

        if (!text || text.includes("error") || text.includes("localhost") || text.includes("development")) {
          throw new Error("Proxy error");
        }

        const parts = text.split(" - ");
        const title = parts.slice(0, -1).join(" - ");
        const artist = parts[parts.length - 1];

        document.getElementById("songTitle").innerText = title || "Estas Escuchando:";
        document.getElementById("nowPlaying").innerText = artist || "";

        // Artwork fetching temporarily disabled
        // const artworkUrl = await getArtworkUrl();
        // if (artworkUrl && !artworkUrl.includes("error")) {
        //   cover.src = artworkUrl;
        // }
      } catch (err) {
        console.error("Metadata fetch error:", err);
        document.getElementById("songTitle").innerText = "Estas Escuchando:";
        document.getElementById("nowPlaying").innerText = "";
        cover.src = "images/fallback.webp";
      }
    }

    fetchMetadata();
    setInterval(fetchMetadata, 12000);
  </script>
  <script>
    function isIos() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isAndroid() {
      return /android/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return ('standalone' in window.navigator) && window.navigator.standalone;
    }

    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function tryShowInstallModal() {
      if (isInStandaloneMode()) return;
      try {
        if (localStorage.getItem("pwaDismissed")) return;
      } catch {}
      showInstallModal();
    }

    playBtn.addEventListener("click", () => {
      tryShowInstallModal();
    }, { once: true });

    function showInstallModal() {
      const existingModal = document.getElementById("installModal");
      if (existingModal) existingModal.remove();

      const modal = document.createElement("div");

      modal.innerHTML = `
        <div id="installModal" style="
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.65);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          padding: 20px;
          box-sizing: border-box;
          backdrop-filter: blur(6px);
        ">

          <div style="
            background: white;
            width: 100%;
            max-width: 340px;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            font-family: Arial, sans-serif;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
          ">

            <h2 style="
              margin-top: 0;
              color: #00341a;
              font-size: 24px;
            ">
              Instalar App
            </h2>

            <p style="
              color: #444;
              line-height: 1.5;
              font-size: 15px;
              margin-bottom: 24px;
            ">
              Instala Bethel Radio en tu teléfono para escuchar la radio fácilmente en cualquier momento.
            </p>

            <button id="installBtn" style="
              width: 100%;
              background: #00af5c;
              color: white;
              border: none;
              padding: 14px;
              border-radius: 14px;
              font-size: 16px;
              cursor: pointer;
              margin-bottom: 12px;
            ">
              📲 Instalar
            </button>

            <button id="closeBtn" style="
              background: transparent;
              border: none;
              color: #777;
              font-size: 14px;
              cursor: pointer;
            ">
              Ahora no
            </button>

          </div>
        </div>
      `;

      document.body.appendChild(modal);

      const installBtn = document.getElementById("installBtn");
      const closeBtn = document.getElementById("closeBtn");

      installBtn.addEventListener("click", async () => {
        try { localStorage.setItem("pwaDismissed", "1"); } catch {}

        if (isIos()) {

          alert(
            "En iPhone:\n\n1. Presiona el botón Compartir\n2. Luego selecciona 'Agregar a pantalla de inicio'"
          );

        } else if (isAndroid() && deferredPrompt) {

          deferredPrompt.prompt();

          const choice = await deferredPrompt.userChoice;

          deferredPrompt = null;
        }

      });

      closeBtn.addEventListener("click", () => {
        try { localStorage.setItem("pwaDismissed", "1"); } catch {}
        const modalEl = document.getElementById("installModal");
        if (modalEl) modalEl.remove();
      });

    });
  </script>
</body>
</html>
